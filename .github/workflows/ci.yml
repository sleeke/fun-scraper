name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm --prefix backend install

      - name: Run backend tests (unit)
        run: npm --prefix backend test -- --testPathIgnorePatterns=ticketmaster.integration

      - name: Run Ticketmaster integration tests
        # Skipped automatically when the secret is absent (forks, contributors).
        # Add TICKETMASTER_API_KEY in Settings → Secrets and variables → Actions
        # to enable this step.
        env:
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
        run: npm --prefix backend test -- --testPathPatterns=ticketmaster.integration

  frontend-build:
    name: Frontend lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix frontend install --legacy-peer-deps

      - name: Lint
        run: npm --prefix frontend run lint

      - name: Build
        run: npm --prefix frontend run build
